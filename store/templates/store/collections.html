{% extends 'store/layouts/main.html' %}
{% block content %}

<div class="py-3 bg-secondary">
    <div class="container">
        <a class="text-white" href="{% url 'home' %}">Home/</a>
        <a class="text-white" href="{% url 'collections' %}">Collections</a>
    </div>
</div>

<div class="container my-5">
    <div class="row">
        <div class="col-md-12">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 class="section-title mb-1">Collections</h2>
                    <p class="section-subtitle mb-0">Browse by category.</p>
                </div>
            </div>
            <div class="row g-4">
                {% for item in category %}
                <div class="col-md-3">
                    <a href="{% url 'collectionsview' item.slug %}" class="category-tile d-block h-100">
                        <h4 class="text-center">{{ item.name }}</h4>
                        <p class="text-muted text-center small mb-0">{{ item.description }}</p>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
