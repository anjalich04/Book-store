{% extends 'store/layouts/main.html' %}
{% block content %}

<div class="py-3 bg-secondary">
  <div class="container">
    <a class="text-white" href="{% url 'home' %}">Home/</a>
    <a class="text-white" href="{% url 'authors' %}">Authors</a>
  </div>
</div>

<div class="py-5">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h2 class="section-title mb-1">Authors</h2>
        <p class="section-subtitle mb-0">Browse books by author.</p>
      </div>
      <form class="d-flex" method="get">
        <input class="form-control me-2" type="search" name="q" placeholder="Filter authors" value="{{ query }}">
        <button class="btn btn-outline-primary" type="submit">Search</button>
      </form>
    </div>

    <div class="row g-3">
      {% for name in authors %}
      <div class="col-md-3">
        <div class="card shadow-soft border-0 p-3 h-100">
          <h6 class="mb-0">{{ name }}</h6>
        </div>
      </div>
      {% empty %}
      <div class="col-12">No authors found.</div>
      {% endfor %}
    </div>
  </div>
</div>

{% endblock %}
